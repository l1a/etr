name: Release and Distribution

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release

      - name: Generate shell completions
        run: |
          mkdir -p completions
          target/release/etr --completions bash  > completions/etr.bash
          target/release/etr --completions zsh   > completions/etr.zsh
          target/release/etr --completions fish  > completions/etr.fish
          target/release/etr --completions nushell > completions/etr.nu

      - name: Package release assets
        run: |
          mkdir -p dist
          cp target/release/etr  dist/etr-linux-x86_64
          cp target/release/etrs dist/etrs-linux-x86_64
          cp -r completions dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
