name: Release and Distribution

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: release-linux
            suffix: linux-x86_64
          - os: macos-latest
            artifact: release-macos
            suffix: macos-aarch64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release

      - name: Package release assets
        run: |
          mkdir -p dist
          cp target/release/etr  dist/etr-${{ matrix.suffix }}
          cp target/release/etrs dist/etrs-${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prune:
    name: Prune old releases
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Delete releases beyond 20 most recent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release list --limit 1000 --json tagName --jq '.[20:][].tagName' \
            | xargs -r -I{} gh release delete {} --yes --cleanup-tag
