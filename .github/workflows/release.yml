name: Release and Distribution

on:
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build Multi-platform Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: etr-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: etr-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: etr-windows.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Release Binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename and Prepare Binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/etr.exe dist/etr-windows.exe
            cp target/${{ matrix.target }}/release/etrs.exe dist/etrs-windows.exe
          else
            cp target/${{ matrix.target }}/release/etr dist/${{ matrix.artifact_name }}
            cp target/${{ matrix.target }}/release/etrs dist/etrs-${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-build
          path: dist/*

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate Shell Completions
        run: |
          mkdir -p completions
          # Build local binary to generate completions (done on host or runner)
          cargo build --release
          target/release/etr completions bash > completions/etr.bash
          target/release/etr completions zsh > completions/etr.zsh
          target/release/etr completions fish > completions/etr.fish
          target/release/etr completions powershell > completions/etr.ps1
          target/release/etr completions nushell > completions/etr.nu

      - name: Package Assets
        run: |
          mkdir -p release-assets
          find dist -type f -exec cp {} release-assets/ \;
          cp -r completions release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
