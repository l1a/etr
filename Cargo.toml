[package]
name = "etr"
version = "0.1.2"
edition = "2024"
description = "A Rust implementation of Eternal Terminal (et)"
license = "GPL-3.0-only"
repository = "https://github.com/ktobias/etr"

[dependencies]
futures = "0.3"
tokio = { version = "1.38", features = ["full"] }
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
clap_complete_nushell = "0.1"
portable-pty = "0.9"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
rand = "0.8"
crossterm = "0.27"
nix = { version = "0.29", features = ["fs", "term", "process", "signal"] }

